name: Update Market Data

on:
  schedule:
    - cron: '0 13 * * 1'   # every Monday ~9am ET (13:00 UTC)
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab too

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch market/macro data
        env:
          RENTCAST_API_KEY: ${{ secrets.RENTCAST_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Fetch RSS headlines
        run: python scripts/fetch_rss.py

      - name: Commit updated data
        run: |
          git config user.name "market-data-bot"
          git config user.email "market-data-bot@users.noreply.github.com"
          git add data/*.json
          # (markets_data.json, macro_data.json, and rss_data.json all land here)
          git diff --staged --quiet || git commit -m "Auto-update market data ($(date -u +%Y-%m-%d))"
          git push
